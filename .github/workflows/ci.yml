name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.24"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download
        # use bash on Windows to keep commands consistent
        shell: bash

      - name: Verify dependencies
        run: go mod verify
        shell: bash

      - name: Build
        run: go build -v ./...
        shell: bash

      - name: Vet
        run: go vet ./...
        shell: bash

      - name: Test
        # On Windows runners, PowerShell is default; use bash for consistency
        run: |
          if [ "${RUNNER_OS}" = "Windows" ] && [ "$(go env GOARCH)" != "amd64" ]; then
            go test -v -coverprofile=coverage.out ./...
          else
            go test -v -race -coverprofile=coverage.out ./...
          fi
        shell: bash

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build-matrix:
    name: Cross-compile
    runs-on: ubuntu-latest
    needs: [test, lint]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags "-s -w" -o lokai-${{ matrix.goos }}-${{ matrix.goarch }}${ext} ./cmd/lokai

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: lokai-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lokai-*
