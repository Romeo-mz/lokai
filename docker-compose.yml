services:
  # Ollama server
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment below to run on GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: ${OLLAMA_GPU_DRIVER-nvidia}
    #           count: ${OLLAMA_GPU_COUNT-1}
    #           capabilities:
    #             - gpu

  # lokai CLI
  lokai:
    build:
      context: .
      args:
        VERSION: dev
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    # Interactive mode needs a TTY
    stdin_open: true
    tty: true

volumes:
  ollama_data:
