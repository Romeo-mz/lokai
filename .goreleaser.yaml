version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: lokai
    main: ./cmd/lokai
    binary: lokai
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: lokai
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: romeo-mz
    name: lokai
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

brews:
  - repository:
      owner: romeo-mz
      name: homebrew-tap
    name: lokai
    homepage: "https://github.com/romeo-mz/lokai"
    description: "Find the best local AI model for your hardware"
    install: |
      bin.install "lokai"
